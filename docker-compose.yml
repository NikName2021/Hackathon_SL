services:

  postgres_pr:
    container_name: hackathon_mes_postgres
    image: postgres:17.6
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-hackathon_db}
      TZ: "Europe/Moscow"
    volumes:
      - hackathon_SL_vol:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    networks:
      - hackathon_SL_net

  hackathon_mes_backend:
    container_name: hackathon_mes_backend
    build:
      context: src
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_pr:5432/${POSTGRES_DATABASE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MEMOIZATION_FLAG=True
    volumes:
      - ./src/app/uploads:/app/uploads
    depends_on:
      - postgres_pr
    ports:
      - "8000:8000"
    networks:
      - hackathon_SL_net

  frontend:
    container_name: hackathon_mes_frontend
    build:
      context: spa
    restart: always
    ports:
      - "80:80"
    depends_on:
      - hackathon_mes_backend
    networks:
      - hackathon_SL_net

volumes:
  hackathon_SL_vol:
    driver: local

networks:
  hackathon_SL_net:
    driver: bridge
