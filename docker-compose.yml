services:
  postgres_pr:
    container_name: hackathon_mes_postgres
    image: postgres:17.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-hackathon_db}
      TZ: "Europe/Moscow"
    volumes:
      - hackathon_SL_vol:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    networks:
      - hackathon_SL_net

  hackathon_mes_backend:
    container_name: hackathon_mes_backend
    build:
      context: src
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-hackathon_db}
      - SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_change_me}
      - MEMOIZATION_FLAG=True
      - DEMO_SEED=${DEMO_SEED:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - MAIL_FROM=${MAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./src/app/uploads:/app/uploads
    depends_on:
      - postgres_pr
    ports:
      - "8000:8000"
    networks:
      - hackathon_SL_net

  frontend:
    container_name: hackathon_mes_frontend
    build:
      context: spa
    ports:
      - "80:80"
    depends_on:
      - postgres_pr
    volumes:
      - ./src/app/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - hackathon_SL_net

volumes:
  hackathon_SL_vol:
    driver: local

networks:
  hackathon_SL_net:
    driver: bridge
